image: freebsd/latest
packages:
    - gcc
tasks:
    - clang-build: |
        cd kakoune
        make CXX=clang++ -j$(sysctl -n hw.ncpu)
    - clang-test: |
        cd kakoune
        LC_ALL=en_US.UTF-8 make test
    - gcc-build: |
        cd kakoune
        make clean
        make CXX=g++ -j$(sysctl -n hw.ncpu)
    - gcc-test: |
        cd kakoune
        LC_ALL=en_US.UTF-8 make test
